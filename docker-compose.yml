version: '3.8'

services:
  # Le Broker (Le cœur du système)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"   # Pour ton script Python sur ton PC
      - "29092:29092" # Pour la communication interne Docker

  # L'interface Console (Plus simple, plus de mapping d'erreurs)
  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    environment:
      - KAFKA_BROKERS=redpanda:29092
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

  # Le cache pour plus tard
  redis:
    image: redis:7.2-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

  # Ton moteur de calcul
  spark-master:
    image: apache/spark-py:latest
    container_name: spark-master
    #user: root
    environment:
      - SPARK_MODE=master
    ports:
      - "8081:8080"
      - "7077:7077"
    command: ["/opt/spark/bin/spark-class","org.apache.spark.deploy.master.Master"]